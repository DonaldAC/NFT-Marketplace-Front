  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <!-- <a class="navbar-brand" routerLink="">0xBattleGround</a> -->
      <a class="navbar-brand" routerLink=""><img src="../../../assets/img/logo.png"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" routerLink="" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact:true}">HOME</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="menu" routerLinkActive="active-link">MARKETPLACE</a>
          </li>
          <!-- <li class="nav-item">
            <a class="nav-link" routerLink="menu" routerLinkActive="active-link">MENU</a>
          </li> -->
          <li class="nav-item">
            <a class="nav-link" routerLink="about" routerLinkActive="active-link">ABOUT</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="contact" routerLinkActive="active-link">CONTACT</a>
          </li>
          <li class="nav-item">
            <div class="dropdown">
              <button id="connectButton" class="wallet" (click)="connectWallet()" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                <i class="bi bi-wallet"></i> {{ walletButtonLabel }}
              </button>
              <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                <li><a class="dropdown-item" href="#" (click)="disconnectWallet()">Disconnect</a></li>
                <li><a class="dropdown-item" href="#" (click)="checkMyNFTs()">My NFTs</a></li>
                <li><a class="dropdown-item" href="#" (click)="checkMyBalance()">My Balance</a></li>
              </ul>
            </div>
            <p class="text-danger mt-3" *ngIf="errorMessage">{{ errorMessage }}</p>
          </li>
        </ul>
      </div>
    </div>
  </nav>
